<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando...</title>

<meta http-equiv="refresh" content="1;url=https://app.monetizze.com.br/r/AZU12577854/?src=meusite">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e5e7eb;
}

.card {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    padding: 60px 40px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(37, 99, 235, 0.15);
    text-align: center;
    max-width: 520px;
    width: 90%;
    border: 1px solid rgba(255,255,255,0.05);
}

h1 {
    font-size: 30px;
    margin-bottom: 15px;
    letter-spacing: 0.5px;
}

.emoji {
    font-size: 55px;
    margin-left: 10px;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
}

p {
    font-size: 17px;
    color: #9ca3af;
}

.loader {
    margin: 30px auto 0;
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>

<script>
setTimeout(function() {
    window.location.href = "https://app.monetizze.com.br/r/AZU12577854/?src=meusite";
}, 1000);
</script>

</head>
<body>

<div class="card">
    <h1>Tudo certo! <span class="emoji">👍</span></h1>
    <p>Carregando, aguarde...</p>
    <div class="loader"></div>
</div>

</body>
</html>
